# Omarchy-Supreme Hyprland Config
# 500% ULTIMATE GLOW EDITION

# Vibrant Neon Palette
$activeBorderColor = rgba(ff00ffee) rgba(00ffffff) rgba(ff00ffee) 45deg
$inactiveBorderColor = rgba(1a1b26aa)

general {
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    border_size = 3
    gaps_in = 10
    gaps_out = 20
    
    # Enable border animation effect
    # Note: requires specialized animation in animations block
}

decoration {
    rounding = 18
    rounding_power = 2
    
    active_opacity = 0.92
    inactive_opacity = 0.82

    # ULTRA-PREMIUM BLUR
    blur {
      enabled = true
      size = 12
      passes = 4
      new_optimizations = true
      xray = true
      ignore_opacity = true
      vibrancy = 0.25
      contrast = 1.1
      brightness = 1.05
    } 
    
    shadow {
        enabled = true
        range = 35
        render_power = 4
        color = rgba(0,0,0,0.7)
    }

    dim_inactive = true
    dim_strength = 0.25
}

animations {
    enabled = true

    # Custom Beziers for that "Living" feel
    bezier = fluent, 0.1, 0.9, 0.2, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = bounce, 0.7, -0.5, 0.2, 1.5

    # Animation set
    animation = windows, 1, 5, overshot, slide
    animation = windowsIn, 1, 4, fluent, popin 80%
    animation = windowsOut, 1, 4, smoothOut, popin 80%
    animation = windowsMove, 1, 4, fluent
    animation = border, 1, 15, default
    animation = borderangle, 1, 100, default, loop # Smoothly rotating border colors
    animation = fade, 1, 6, default
    animation = workspaces, 1, 7, fluent, slidefade 30%
    animation = layers, 1, 4, overshot, slide
}
