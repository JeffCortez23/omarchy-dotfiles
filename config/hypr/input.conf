# Input configuration restored to user preferences

input {
    # Keyboard setup
    kb_layout = latam
    kb_variant =
    kb_model =
    kb_options = 
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = true
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

gestures {
    # workspace_swipe is disabled because it causes errors in Hyprland 0.54
    # workspace_swipe = true 
}

# Alternative for 3-finger workspace switching (Gestures)
# If workspace_swipe doesn't work, we can bind swipes to workspace dispatchers
bind = , edge:r:l, workspace, +1
bind = , edge:l:r, workspace, -1
