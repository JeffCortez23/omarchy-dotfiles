source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = ~/.config/omarchy/current/background
    blur_passes = 4
    blur_size = 10
    noise = 0 # Removed grain
    contrast = 1.0 # Higher contrast
    brightness = 0.5 # Darker for better pop
    vibrancy = 0.5
}

# TIME (Ultra Large & Clean)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $font_color
    font_size = 160
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, -100
    halign = center
    valign = top
    shadow_passes = 2
}
# DATE (Elegant beneath time)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = $font_color
    font_size = 20
    font_family = JetBrainsMono Nerd Font SemiBold
    position = 0, -320
    halign = center
    valign = top
}

# AVATAR (Centered with glow)
image {
    monitor =
    path = /home/elyefris/.config/hypr/avatar.png
    size = 140
    border_size = 5
    border_color = $outer_color
    rounding = -1
    position = 0, 80
    halign = center
    valign = center
    shadow_passes = 2
}

# GREETING (Styled)
label {
    monitor =
    text = Welcome back, <span weight="bold">$USER</span>
    color = $font_color
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, -40
    halign = center
    valign = center
}

# LOCK ICON (Visual cue)
label {
    monitor =
    text = 󰌾
    color = $outer_color
    font_size = 24
    position = 0, 180
    halign = center
    valign = bottom
}

# INPUT FIELD (Refined)
input-field {
    monitor =
    size = 320, 55
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = $outer_color
    inner_color = $inner_color
    font_color = $font_color
    fade_on_empty = false
    placeholder_text = <i>Enter Password...</i>
    hide_input = false
    position = 0, 100
    halign = center
    valign = bottom
    rounding = 20
    check_color = $check_color
    fail_color = rgb(204, 34, 34)
}


# SYSTEM INFO PILL (Clean top right)
label {
    monitor =
    text = cmd[update:1000] echo "󰁹 $(cat /sys/class/power_supply/BAT0/capacity)%  󰖩 $(nmcli -t -f active,ssid dev wifi | grep '^yes' | cut -d: -f2 | sed 's/^$/Disconnected/')"
    color = $font_color
    font_size = 13
    font_family = JetBrainsMono Nerd Font Bold
    position = -40, -40
    halign = right
    valign = top
}

# SHUTDOWN/REBOOT HINTS (Minimalist)
label {
    monitor =
    text = 󰐥  󰜉  󰤄
    color = rgba(255, 255, 255, 0.2)
    font_size = 20
    position = 0, 30
    halign = center
    valign = bottom
}
