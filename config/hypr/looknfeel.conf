# ULTRA-ESTILO OVERHAUL - ElYefris Edition

general {
    # Compact & Sharp
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    
    # Animated Gradient: Cyan to Purple
    col.active_border = rgba(00f2ffee) rgba(e000ffee) 45deg
    col.inactive_border = rgba(595959aa)
}

decoration {
    # Perfect Curves
    rounding = 16

    # Glass Opacity
    active_opacity = 0.95
    inactive_opacity = 0.85

    # Enhanced focus by dimming background
    dim_inactive = true
    dim_strength = 0.25
    
    # Premium Frosted Glass Blur
    blur {
        enabled = true
        size = 12
        passes = 5
        new_optimizations = true
        ignore_opacity = true
        vibrancy = 0.2
        contrast = 1.1
        noise = 0.015
    }
}

animations {
    enabled = yes

    # Elastic & Fluid curves
    bezier = bounce, 0.15, 1.25, 0.3, 1.1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1

    # Apply animations
    animation = windows, 1, 5, bounce, slide
    animation = windowsOut, 1, 5, smoothOut, slide
    animation = windowsMove, 1, 4, default
    animation = border, 1, 10, default
    animation = borderangle, 1, 30, default, loop
    animation = fade, 1, 7, smoothIn
    animation = workspaces, 1, 5, default, slidefade 20%
}
